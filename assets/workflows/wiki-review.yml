name: wiki-review
on:
  schedule:
    - cron: '0 9 * * 1'  # Mon 09:00 UTC
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install uv && uv sync
      - name: run deterministic wiki review
        run: uv run python -m tools.review --wiki-dir wiki --config .alpha-wiki/config.yaml --out review.md
      - name: post issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Weekly wiki review (auto)"
          content-filepath: review.md
          labels: wiki-review
